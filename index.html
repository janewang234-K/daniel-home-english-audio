<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>家庭启蒙便利贴</title>
  <style>
    :root {
      --ink: #233142;
      --soft: #536171;
      --paper: #fffdf7;
      --line: #d8e2ea;
      --yellow: #f7c948;
    }
    * { box-sizing: border-box; }
    body {
      margin: 0;
      font-family: "Microsoft YaHei", Arial, sans-serif;
      color: var(--ink);
      background: var(--paper);
    }
    header {
      position: sticky;
      top: 0;
      z-index: 10;
      background: rgba(255, 255, 255, 0.96);
      border-bottom: 1px solid #eef2f5;
      padding: 14px 18px 12px;
      backdrop-filter: blur(8px);
    }
    .brand {
      max-width: 1100px;
      margin: 0 auto;
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 18px;
    }
    .brand img {
      width: min(42vw, 330px);
      height: auto;
      display: block;
    }
    .title-box { text-align: right; min-width: 220px; }
    h1 {
      margin: 0;
      font-family: "YouYuan", "Microsoft YaHei", sans-serif;
      font-weight: 400;
      font-size: clamp(28px, 5vw, 42px);
      line-height: 1.05;
      letter-spacing: 0;
    }
    .tagline {
      margin-top: 5px;
      color: var(--soft);
      font-size: 14px;
    }
    .title-line {
      height: 2px;
      margin-top: 10px;
      background: var(--yellow);
      border-radius: 999px;
    }
    main {
      max-width: 1100px;
      margin: 0 auto;
      padding: 18px;
    }
    .toolbar {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 12px;
      margin-bottom: 14px;
      flex-wrap: wrap;
    }
    .rooms {
      display: flex;
      gap: 8px;
      overflow-x: auto;
      padding: 2px 0 6px;
    }
    button {
      border: 0;
      cursor: pointer;
      font: inherit;
      color: var(--ink);
    }
    .chip {
      flex: 0 0 auto;
      min-height: 36px;
      padding: 0 13px;
      border: 1px solid var(--line);
      border-radius: 999px;
      background: #fff;
      font-weight: 700;
    }
    .chip.active {
      border-color: var(--accent, #25b7c7);
      background: var(--fill, #eaf8fa);
    }
    .stop {
      min-height: 36px;
      padding: 0 14px;
      border-radius: 999px;
      background: #233142;
      color: #fff;
      font-weight: 700;
    }
    .grid {
      display: grid;
      grid-template-columns: repeat(2, minmax(0, 1fr));
      gap: 12px;
    }
    .card {
      display: grid;
      grid-template-columns: 72px minmax(0, 1fr) 52px;
      gap: 12px;
      align-items: center;
      min-height: 92px;
      padding: 10px 12px 10px 10px;
      border: 1.6px solid var(--accent);
      border-radius: 12px;
      background: var(--fill);
    }
    .icon-box {
      width: 72px;
      height: 72px;
      border-radius: 10px;
      background: #fff;
      display: grid;
      place-items: center;
      overflow: hidden;
    }
    .icon-box img {
      width: 72px;
      height: 72px;
      object-fit: contain;
    }
    .en {
      font-size: clamp(18px, 2.6vw, 24px);
      line-height: 1.15;
      font-weight: 800;
      overflow-wrap: anywhere;
    }
    .cn {
      margin-top: 7px;
      color: var(--soft);
      font-size: 13px;
    }
    .play {
      width: 44px;
      height: 44px;
      border-radius: 50%;
      background: #fff;
      border: 2px solid var(--accent);
      color: var(--accent);
      font-size: 18px;
      font-weight: 900;
      line-height: 1;
    }
    .play.playing {
      background: var(--accent);
      color: #fff;
    }
    .hint {
      color: var(--soft);
      font-size: 13px;
      line-height: 1.6;
      margin: 14px 2px 0;
    }
    @media (max-width: 720px) {
      header { padding: 12px 12px 10px; }
      .brand { align-items: flex-start; }
      .brand img { width: 42vw; max-width: 220px; }
      .title-box { min-width: 0; flex: 1; }
      .grid { grid-template-columns: 1fr; }
      .card { grid-template-columns: 62px minmax(0, 1fr) 46px; min-height: 82px; }
      .icon-box, .icon-box img { width: 62px; height: 62px; }
      .play { width: 40px; height: 40px; }
    }
  </style>
</head>

    let activeRoom = 'all';
    let voices = [];
    let currentButton = null;

    const roomEl = document.getElementById('rooms');
    const gridEl = document.getElementById('grid');
    const stopBtn = document.getElementById('stopBtn');

    function loadVoices() {
      voices = window.speechSynthesis ? window.speechSynthesis.getVoices() : [];
    }

    function bestVoice() {
      const usVoices = voices.filter(v => /^en[-_]US/i.test(v.lang || ''));
      const preferredNames = ['Jenny', 'Aria', 'Samantha', 'Ava', 'Zira', 'Susan', 'Female', 'Google US English'];
      for (const name of preferredNames) {
        const match = usVoices.find(v => (v.name || '').toLowerCase().includes(name.toLowerCase()));
        if (match) return match;
      }
      return usVoices[0] || voices.find(v => /^en/i.test(v.lang || '')) || null;
    }

    function stopSpeaking() {
      if (window.speechSynthesis) window.speechSynthesis.cancel();
      if (currentButton) currentButton.classList.remove('playing');
      currentButton = null;
    }

    function speak(text, button) {
      if (!('speechSynthesis' in window)) {
        alert('当前浏览器暂不支持网页朗读，请换 Chrome、Edge 或 Safari 打开。');
        return;
      }
      stopSpeaking();
      const utterance = new SpeechSynthesisUtterance(text);
      utterance.lang = 'en-US';
      utterance.rate = 0.9;
      utterance.pitch = 1.04;
      const voice = bestVoice();
      if (voice) utterance.voice = voice;
      utterance.onend = stopSpeaking;
      utterance.onerror = stopSpeaking;
      currentButton = button;
      button.classList.add('playing');
      window.speechSynthesis.speak(utterance);
    }

    function allItems() {
      return ROOMS.flatMap(room => room.items.map((item, index) => ({ ...item, room, index })));
    }

    function renderRooms() {
      const buttons = [
        { key: 'all', title: 'All' },
        ...ROOMS.map(room => ({ key: room.key, title: room.title, color: room.color, fill: room.fill }))
      ];
      roomEl.innerHTML = buttons.map(room => `
        <button class="chip ${room.key === activeRoom ? 'active' : ''}" data-room="${room.key}" style="--accent:${room.color || '#25B7C7'};--fill:${room.fill || '#EAF8FA'}">${room.title}</button>
      `).join('');
      roomEl.querySelectorAll('button').forEach(btn => {
        btn.addEventListener('click', () => {
          activeRoom = btn.dataset.room;
          stopSpeaking();
          render();
        });
      });
    }

    function renderCards() {
      const items = allItems().filter(item => activeRoom === 'all' || item.room.key === activeRoom);
      gridEl.innerHTML = items.map((item, idx) => `
        <article class="card" style="--accent:${item.room.color};--fill:${item.room.fill}">
          <div class="icon-box"><img src="${item.icon}" alt=""></div>
          <div>
            <div class="en">${item.sentence}</div>
            <div class="cn">${item.cn}</div>
          </div>
          <button class="play" data-text="${item.sentence.replace(/"/g, '&quot;')}" aria-label="播放 ${item.sentence}">▶</button>
        </article>
      `).join('');
      gridEl.querySelectorAll('.play').forEach(btn => {
        btn.addEventListener('click', () => speak(btn.dataset.text, btn));
      });
    }

    function render() {
      renderRooms();
      renderCards();
    }

    stopBtn.addEventListener('click', stopSpeaking);
    if ('speechSynthesis' in window) {
      loadVoices();
      window.speechSynthesis.onvoiceschanged = loadVoices;
    }
    render();
  </script>
</body>
</html>
